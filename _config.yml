# Site settings
title:          David's soup
description:    "Minimal Jekyll theme for storytellers"
#baseurl:        "/tale"
url:            "https://teddyand.github.io"


remote_theme: chesterhow/tale

# Google Analytics
google_analytics: UA—XXXXXXXX-X

# Author
author:
  name:         David chen
  url:          https://teddyand.github.io
  email:        davidchen1977@live.com

# Build settings
markdown:       kramdown
#mathjax:       true
#theme:  minima
include:
  - _pages

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-spaceship
  - jekyll-scholar
  - jekyll-pdf-embed
  # - jemoji #Uncomment this to allow emoji in your post

#timezone:    Asia/Shanghai

# Permalinks
permalink:            /post/:title          #/:year-:month-:day/:title
paginate:       5
scholar:
      style:   china-national-standard-gb-t-7714-2015-author-date
      source:  ./_bibliography
      bibliography:  papers.bib

      bibliography_template: bib


# Excludes
exclude: [ Gemfile, Gemfile.lock, tale.gemspec ]

# Disqus (Set to your disqus id)
disqus:         jekyll-tale


# Where things are
jekyll-spaceship:
  # default enabled processors
  processors:
    - table-processor
    - mathjax-processor
    - plantuml-processor
    - mermaid-processor
    - polyfill-processor
    - media-processor
    - emoji-processor
    - element-processor
  mathjax-processor:
    src:
      #- https://polyfill.io/v3/polyfill.min.js?features=es6
      #- https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
      #- http://mathjax.josephjctang.com/MathJax.js?config=TeX-MML-AM_HTMLorMML
      #- https://cdn.jsdelivr.net/npm/katex@0.11.1/dist/katex.min.js
     -  https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-MML-AM_HTMLorMML
    config:
      tex:
        inlineMath:
          #- ['$','$']
          #- ['\(','\)']
          - ['\\(','\\)']
        displayMath:
          - ['$$','$$']
          - ['\[','\]']
      svg:
        fontCache: 'global'
    optimize: # optimization on building stage to check and add mathjax scripts
      enabled: true # value `false` for adding to all pages
      include: []   # include patterns for math expressions checking (regexp)
      exclude: []   # exclude patterns for math expressions checking (regexp)
  plantuml-processor:
    mode: default  # mode value 'pre-fetch' for fetching image at building stage
    css:
      class: plantuml
    syntax:
      code: 'plantuml!'
      custom: ['@startuml', '@enduml']
    src: http://www.plantuml.com/plantuml/svg/
  mermaid-processor:
    mode: default  # mode value 'pre-fetch' for fetching image at building stage
    css:
      class: mermaid
    syntax:
      code: 'mermaid!'
      custom: ['@startmermaid', '@endmermaid']
    config:
      theme: default
    src: https://mermaid.ink/svg/
  media-processor:
    default:
      id: 'media-{id}'
      class: 'media'
      width: '100%'
      height: 350
      frameborder: 0
      style: 'max-width: 600px; outline: none;'
      allow: 'encrypted-media; picture-in-picture'
  emoji-processor:
    css:
      class: emoji
    src: https://github.githubassets.com/images/icons/emoji/